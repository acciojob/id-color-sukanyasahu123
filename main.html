<!DOCTYPE html>
<html>
<head>
<title>CSS ID Selector</title>

<style>

#yellow{
background-color: yellow;
border: 1px solid green;
}

#red{
background-color: red;
border: 1px solid black;
}

#green{
background-color: green;
border: 1px solid yellow;
}

</style>

</head>

<body>

<p id="yellow">This is yellow paragraph</p>

<p id="red">This is red paragraph</p>

<p id="green">This is green paragraph</p>

</body>
</html>
